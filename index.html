<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur Erlang-B | Royal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; font-size: 1.4rem; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #1557b0; }
        #result-area {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f0fe;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .res-label { color: #1967d2; font-size: 0.9rem; margin-bottom: 5px; }
        .res-value { font-size: 1.8rem; font-weight: bold; color: #1a73e8; }
        .footer {
            margin-top: 20px;
            font-size: 0.75rem;
            text-align: center;
            color: #94a3b8;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Dimensionnement Erlang</h2>
    
    <div class="input-group">
        <label>Trafic offert (Erlangs)</label>
        <input type="number" id="traffic" step="any" placeholder="Ex: 12.5">
    </div>

    <div class="input-group">
        <label>Qualité de service (Pr)</label>
        <input type="number" id="blocking" step="any" placeholder="Ex: 0.01">
    </div>

    <button onclick="calculate()">Calculer maintenant</button>

    <div id="result-area">
        <div class="res-label">Canaux nécessaires (N)</div>
        <div id="result-n" class="res-value">0</div>
    </div>

    <div class="footer">
        Outil de dimensionnement réseau professionnel | Créé par Royal
    </div>
</div>

<script>
    function calculate() {
        const A = parseFloat(document.getElementById('traffic').value);
        const Pb_target = parseFloat(document.getElementById('blocking').value);
        const resultArea = document.getElementById('result-area');
        const resultN = document.getElementById('result-n');

        if (isNaN(A) || isNaN(Pb_target) || A <= 0 || Pb_target <= 0) {
            alert("Veuillez remplir les deux champs avec des nombres positifs.");
            return;
        }

        let n = 1;
        let b = (A) / (1 + A);

        while (b > Pb_target && n < 1000) {
            n++;
            b = (A * b) / (n + (A * b));
        }

        resultN.innerText = n;
        resultArea.style.display = 'block';
    }
</script>

</body>
</html>

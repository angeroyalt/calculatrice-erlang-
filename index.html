<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur Erlang-B | Royal</title>
    <style>
        /* L'apparence du début que tu aimais */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #34495e;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result {
            margin-top: 25px;
            padding: 15px;
            background-color: #ecf0f1;
            border-radius: 6px;
            font-size: 18px;
            color: #2c3e50;
            display: none;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculateur Erlang-B</h1>
    
    <div class="input-group">
        <label for="traffic">Trafic offert (A en Erlangs) :</label>
        <input type="number" id="traffic" step="any" placeholder="Ex: 10.5">
    </div>

    <div class="input-group">
        <label for="blocking">Probabilité de blocage (Pb) :</label>
        <input type="number" id="blocking" step="any" placeholder="Ex: 0.02">
    </div>

    <button onclick="calculate()">Lancer le calcul</button>

    <div id="resultBox" class="result">
        Nombre de canaux requis (N) : <br>
        <strong id="finalN" style="font-size: 24px; color: #e67e22;">0</strong>
    </div>

    <div class="footer">
        Outil de dimensionnement réseau professionnel | Créé par Royal
    </div>
</div>

<script>
    function calculate() {
        const A = parseFloat(document.getElementById('traffic').value);
        const Pb_target = parseFloat(document.getElementById('blocking').value);
        const resultBox = document.getElementById('resultBox');
        const displayN = document.getElementById('finalN');

        if (isNaN(A) || isNaN(Pb_target) || A <= 0 || Pb_target <= 0) {
            alert("Veuillez entrer des valeurs valides et positives.");
            return;
        }

        let N = 1;
        let B = (A) / (1 + A); // Calcul pour N = 1

        // Boucle itérative précise
        while (B > Pb_target && N < 1000) {
            N++;
            B = (A * B) / (N + (A * B));
        }

        displayN.innerText = N;
        resultBox.style.display = 'block';
    }
</script>

</body>
</html>
